<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    header h1 { font-size: 18px; color: #7c6ef7; }

    #clear-btn {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    #clear-btn:hover { border-color: #e05c5c; color: #e05c5c; }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #7c6ef7;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .ai {
      align-self: flex-start;
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      font-size: 14px;
      color: #888;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      color: #f1f1f1;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    #user-input:focus { border-color: #7c6ef7; }
    #user-input::placeholder { color: #666; }

    #send-btn {
      padding: 12px 22px;
      background: #7c6ef7;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #6a5de0; }
    #send-btn:disabled { background: #444; cursor: not-allowed; }

    /* ── Voice & File buttons ── */
    .icon-btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #aaa;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: #7c6ef7; color: #7c6ef7; background: #1e1e2e; }
    #mic-btn.listening {
      background: #3b0000;
      border-color: #e05c5c;
      color: #e05c5c;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224,92,92,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(224,92,92,0); }
    }

    /* ── File bubble ── */
    .file-bubble {
      align-self: flex-end;
      background: #2a2040;
      border: 1px solid #5a4fbf;
      border-radius: 12px;
      border-bottom-right-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c4b5fd;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 75%;
    }
    .file-bubble .file-icon { font-size: 20px; }
    .file-bubble .file-info { display: flex; flex-direction: column; }
    .file-bubble .file-name { font-weight: 600; color: #e0d9ff; word-break: break-all; }
    .file-bubble .file-size { font-size: 11px; color: #7c6ef7; margin-top: 2px; }

    #empty-state {
      text-align: center;
      color: #444;
      margin: auto;
      font-size: 14px;
    }
    #empty-state span { font-size: 36px; display: block; margin-bottom: 10px; }

    /* ── Search result card ── */
    .search-card {
      align-self: flex-start;
      max-width: 75%;
      background: #161b2e;
      border: 1px solid #2e3a5c;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
    }
    .search-card .search-badge {
      display: inline-block;
      background: #1e3a8a;
      color: #93c5fd;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .search-card .search-heading {
      font-size: 15px;
      font-weight: 700;
      color: #e0e7ff;
      margin-bottom: 6px;
    }
    .search-card .search-abstract {
      color: #aab4d4;
      margin-bottom: 8px;
    }
    .search-card .search-source a {
      color: #7c6ef7;
      text-decoration: none;
      font-size: 12px;
    }
    .search-card .search-source a:hover { text-decoration: underline; }
    .search-card .search-related {
      margin-top: 10px;
      border-top: 1px solid #2e3a5c;
      padding-top: 8px;
    }
    .search-card .search-related p {
      color: #666;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .search-card .search-related a {
      display: block;
      color: #7c6ef7;
      font-size: 12px;
      text-decoration: none;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-card .search-related a:hover { text-decoration: underline; }

    /* ── Agent mode toggle ── */
    #agent-toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      user-select: none;
    }
    #agent-toggle-label input { accent-color: #7c6ef7; cursor: pointer; }
    #agent-toggle-label.active { color: #a78bfa; }

    /* ── Agent pipeline card ── */
    .agent-card {
      align-self: flex-start;
      max-width: 80%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 16px;
      font-size: 13px;
    }
    .agent-card .agent-header {
      font-size: 12px;
      font-weight: 700;
      color: #7c6ef7;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .agent-pipeline {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .agent-step {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #8b949e;
      transition: all 0.3s;
    }
    .agent-step.done  { border-color: #3fb950; color: #3fb950; background: #0d1f12; }
    .agent-step.active{ border-color: #d29922; color: #d29922; background: #1f1a0d; animation: pulse 1s infinite; }
    .agent-arrow { color: #30363d; font-size: 14px; }
    .agent-answer {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
      color: #e6edf3;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .agent-meta {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      font-size: 11px;
      color: #8b949e;
    }
    .agent-meta .score { color: #3fb950; font-weight: 700; }
    .agent-meta .changes { font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>🤖 AI Chat</h1>
  <div style="display:flex;gap:10px;align-items:center;">
    <label id="agent-toggle-label" title="Use multi-agent pipeline for deeper answers">
      <input type="checkbox" id="agent-mode" onchange="toggleAgentMode(this)" />
      🧠 Agent Mode
    </label>
    <button id="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
  </div>
</header>

<div id="chat-box">
  <div id="empty-state">
    <span>💬</span>
    Koi message nahi — shuru karo!
  </div>
</div>

<div id="input-area">
  <button class="icon-btn" id="mic-btn"  title="Voice input"   onclick="toggleVoice()">🎙️</button>
  <button class="icon-btn" id="file-btn" title="Upload file"   onclick="document.getElementById('file-input').click()">📎</button>
  <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(event)" />
  <input id="user-input" type="text" placeholder="Kuch poocho... ya mic dabao 🎙️" />
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const IS_PROD        = window.location.hostname !== "localhost";
  const BACKEND        = IS_PROD
    ? "https://ai-chat-backend.onrender.com"   // ← Render URL (update after deploy)
    : "http://localhost:3000";

  const STORAGE_KEY     = "chat_history";
  const API_URL         = `${BACKEND}/chat`;
  const SEARCH_URL      = `${BACKEND}/search`;
  const AGENT_CHAT_URL  = `${BACKEND}/agent-chat`;

  let agentModeOn = false;

  function toggleAgentMode(checkbox) {
    agentModeOn = checkbox.checked;
    document.getElementById("agent-toggle-label").classList.toggle("active", agentModeOn);
    document.getElementById("user-input").placeholder = agentModeOn
      ? "Agent mode: deeper thinking 🧠..."
      : "Kuch poocho... ya mic dabao 🎙️";
  }
  const SEARCH_KEYWORDS = ["news", "weather", "today", "latest", "current", "price", "score", "update", "aaj", "khabar"];

  function shouldSearch(text) {
    const lower = text.toLowerCase();
    return SEARCH_KEYWORDS.some(k => lower.includes(k));
  }

  // ── Load messages from localStorage on page load ──
  window.addEventListener("load", () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const messages = JSON.parse(saved);
      if (messages.length > 0) {
        document.getElementById("empty-state").remove();
        messages.forEach(m => renderMessage(m.role, m.content));
      }
    }
  });

  // ── Send on Enter key ──
  document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });

  // ── Save message to localStorage ──
  function saveMessage(role, content) {
    const saved = localStorage.getItem(STORAGE_KEY);
    const messages = saved ? JSON.parse(saved) : [];
    messages.push({ role, content });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  }

  // ── Render a search result card ──
  function renderSearchCard(result) {
    const chatBox = document.getElementById("chat-box");
    const card = document.createElement("div");
    card.classList.add("search-card");

    let html = `<div class="search-badge">🔍 Web Search</div>`;

    if (result.answer) {
      html += `<div class="search-heading">${result.answer}</div>`;
    }
    if (result.heading) {
      html += `<div class="search-heading">${result.heading}</div>`;
    }
    if (result.abstract) {
      html += `<div class="search-abstract">${result.abstract}</div>`;
    }
    if (result.url) {
      html += `<div class="search-source">📖 <a href="${result.url}" target="_blank">${result.source || result.url}</a></div>`;
    }
    if (result.relatedTopics?.length > 0) {
      html += `<div class="search-related"><p>Related:</p>`;
      result.relatedTopics.forEach(t => {
        html += `<a href="${t.url}" target="_blank">↗ ${t.text.slice(0, 80)}...</a>`;
      });
      html += `</div>`;
    }

    card.innerHTML = html;
    chatBox.appendChild(card);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // ── Render a message bubble in UI ──
  function renderMessage(role, content) {
    const emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    const chatBox = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.classList.add("message", role === "user" ? "user" : "ai");
    div.textContent = content;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  // ── Show typing indicator ──
  function showTyping() {
    const chatBox = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.classList.add("typing");
    div.id = "typing-indicator";
    div.textContent = "AI soch raha hai...";
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  // ── Render agent pipeline card ──
  const AGENTS = [
    { key: "Planner",    emoji: "🗺️" },
    { key: "Researcher", emoji: "🔬" },
    { key: "Executor",   emoji: "⚙️"  },
    { key: "Reviewer",   emoji: "✅"  },
  ];

  function renderAgentCard(activeIndex = -1, result = null) {
    const emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    let card = document.getElementById("live-agent-card");
    if (!card) {
      card = document.createElement("div");
      card.classList.add("agent-card");
      card.id = "live-agent-card";
      document.getElementById("chat-box").appendChild(card);
    }

    const stepsHtml = AGENTS.map((a, i) => {
      const cls = result ? "done" : i < activeIndex ? "done" : i === activeIndex ? "active" : "";
      return `<span class="agent-step ${cls}">${a.emoji} ${a.key}</span>${i < 3 ? '<span class="agent-arrow">→</span>' : ""}`;
    }).join("");

    let bodyHtml = "";
    if (result) {
      bodyHtml = `
        <div class="agent-answer">${result.finalAnswer}</div>
        <div class="agent-meta">
          <span class="score">⭐ Quality: ${result.score}/10</span>
          <span class="changes">📝 ${result.changes}</span>
        </div>`;
    }

    card.innerHTML = `
      <div class="agent-header">🧠 MULTI-AGENT PIPELINE</div>
      <div class="agent-pipeline">${stepsHtml}</div>
      ${bodyHtml}`;

    document.getElementById("chat-box").scrollTop = 99999;
    return card;
  }

  // ── Main send function ──
  async function sendMessage() {
    const input   = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    sendBtn.disabled = true;

    renderMessage("user", message);
    saveMessage("user", message);

    try {
      // ════════════════════════════════
      //  AGENT MODE
      // ════════════════════════════════
      if (agentModeOn) {
        renderAgentCard(0);   // Planner active

        // Animate through agents while waiting (fake real-time feel)
        let step = 0;
        const stepMs = [1800, 2200, 2000]; // approx timing per agent
        for (const ms of stepMs) {
          await new Promise(r => setTimeout(r, ms));
          step++;
          renderAgentCard(step);
        }

        const res  = await fetch(AGENT_CHAT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();

        // Remove live card, render final
        const live = document.getElementById("live-agent-card");
        if (live) live.remove();
        renderAgentCard(-1, data);
        saveMessage("ai", data.finalAnswer);

      // ════════════════════════════════
      //  NORMAL MODE
      // ════════════════════════════════
      } else {
        showTyping();

        // Web search if keyword detected
        if (shouldSearch(message)) {
          const searchRes  = await fetch(SEARCH_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: message }),
          });
          const searchData = await searchRes.json();
          if (searchData.found) {
            removeTyping();
            renderSearchCard(searchData.result);
            showTyping();
          }
        }

        const res  = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data  = await res.json();
        const reply = data.reply || "Koi jawab nahi mila.";

        removeTyping();
        renderMessage("ai", reply);
        saveMessage("ai", reply);
      }

    } catch (err) {
      removeTyping();
      const live = document.getElementById("live-agent-card");
      if (live) live.remove();
      renderMessage("ai", "⚠️ Server se connect nahi ho paya. Backend chal raha hai?");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // ── Voice Input (SpeechRecognition) ──
  let recognition = null;
  let isListening  = false;

  function toggleVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Aapka browser Voice Input support nahi karta. Chrome use karo.");
      return;
    }

    if (isListening) {
      recognition.stop();
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang        = "ur-PK";   // Urdu; change to "en-US" for English
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isListening = true;
      document.getElementById("mic-btn").classList.add("listening");
      document.getElementById("user-input").placeholder = "Sun raha hoon...";
    };

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      document.getElementById("user-input").value = transcript;
    };

    recognition.onend = () => {
      isListening = false;
      document.getElementById("mic-btn").classList.remove("listening");
      document.getElementById("user-input").placeholder = "Kuch poocho... ya mic dabao 🎙️";
    };

    recognition.onerror = (e) => {
      isListening = false;
      document.getElementById("mic-btn").classList.remove("listening");
      if (e.error !== "aborted") alert("Mic error: " + e.error);
    };

    recognition.start();
  }

  // ── File Upload ──
  function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const sizeKB = (file.size / 1024).toFixed(1);
    const sizeTxt = file.size > 1024 * 1024
      ? (file.size / (1024 * 1024)).toFixed(1) + " MB"
      : sizeKB + " KB";

    const icon = getFileIcon(file.name);

    // Show file bubble in chat
    const emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    const chatBox = document.getElementById("chat-box");
    const bubble  = document.createElement("div");
    bubble.classList.add("file-bubble");
    bubble.innerHTML = `
      <span class="file-icon">${icon}</span>
      <div class="file-info">
        <span class="file-name">${file.name}</span>
        <span class="file-size">${sizeTxt} · ${file.type || "unknown type"}</span>
      </div>`;
    chatBox.appendChild(bubble);
    chatBox.scrollTop = chatBox.scrollHeight;

    // Save to localStorage
    saveMessage("user", `📎 File: ${file.name} (${sizeTxt})`);

    // Reset input so same file can be re-uploaded
    event.target.value = "";
  }

  function getFileIcon(filename) {
    const ext = filename.split(".").pop().toLowerCase();
    const map = {
      pdf: "📄", doc: "📝", docx: "📝", txt: "📃",
      xls: "📊", xlsx: "📊", csv: "📊",
      png: "🖼️", jpg: "🖼️", jpeg: "🖼️", gif: "🖼️", webp: "🖼️",
      mp3: "🎵", wav: "🎵", mp4: "🎬", mov: "🎬",
      zip: "🗜️", rar: "🗜️", js: "💻", py: "💻", html: "💻",
    };
    return map[ext] || "📎";
  }

  // ── Clear all chat ──
  function clearChat() {
    if (!confirm("Pura chat delete karna chahte ho?")) return;
    localStorage.removeItem(STORAGE_KEY);
    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML = `
      <div id="empty-state">
        <span>💬</span>
        Koi message nahi — shuru karo!
      </div>`;
  }
</script>

</body>
</html>
